name: Build & Deploy to Synology NAS

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. garykoys/icmp-network-map

jobs:
  build-and-push:
    name: Build image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically provided, no setup needed

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64        # change to linux/arm64 for ARM-based Synology models
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # GitHub Actions cache speeds up rebuilds
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Synology NAS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: add approval gate in GitHub repo settings

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.NAS_COMPOSE_PATH }}

            # Pull the latest image
            docker compose pull

            # Restart only if image actually changed (zero-downtime swap)
            docker compose up -d --remove-orphans

            # Clean up old dangling images to save disk space
            docker image prune -f
